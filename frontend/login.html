<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión — Vitalis</title>
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="pagina-login">
        <div class="login-tarjeta">
            <div class="login-marca">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
                    <circle cx="16" cy="16" r="15" stroke="#0F4C46" stroke-width="2"/>
                    <path d="M8 16H12L14 10L18 22L20 16H24" stroke="#F2613F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Vitalis
            </div>
            <h1>Bienvenido de nuevo</h1>
            <p class="login-subtitulo">Ingresa a tu cuenta para continuar</p>

            <form id="form-login">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" required>

                <button type="submit" class="boton-primario" style="width:100%; margin-top:8px;">Ingresar</button>
            </form>
            <p id="mensaje-error"></p>

            <p class="login-registro">¿No tienes cuenta? <a href="registro.html">Regístrate como paciente</a></p>
            <p class="login-volver"><a href="index.html">← Volver al inicio</a></p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
