<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/panel.css">
</head>
<body>
    <div class="contenedor-panel" style="width: 700px;">
        <div class="cabecera">
            <h1>Panel de Administrador</h1>
            <p id="bienvenida"></p>
            <button onclick="cerrarSesion()">Cerrar sesion</button>
        </div>

        <h2>Usuarios del sistema</h2>
        <div id="lista-usuarios">
            <p>Cargando usuarios...</p>
        </div>

        <h2>Registrar nuevo usuario</h2>
        <form id="form-usuario">
            <label for="email">Correo electronico</label>
            <input type="email" id="email" required>

            <label for="password">Contrasena temporal</label>
            <input type="password" id="password" required>

            <label for="nombre_completo">Nombre completo</label>
            <input type="text" id="nombre_completo" required>

            <label for="rol_id">Rol</label>
            <select id="rol_id" required>
                <option value="">Selecciona un rol</option>
                <option value="1">Administrador</option>
                <option value="2">Médico</option>
                <option value="3">Recepción</option>
                <option value="4">Paciente</option>
            </select>

            <div id="campos-medico" style="display:none;">
                <label for="especialidad">Especialidad</label>
                <input type="text" id="especialidad">

                <label for="colegiatura">Colegiatura</label>
                <input type="text" id="colegiatura">
            </div>

            <div id="campos-paciente" style="display:none;">
                <label for="fecha_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_nacimiento">

                <label for="telefono">Telefono</label>
                <input type="text" id="telefono">
            </div>

            <button type="submit">Registrar Usuario</button>
        </form>
        <p id="mensaje-resultado"></p>
    </div>

    <script src="js/comun.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
