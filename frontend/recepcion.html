<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Recepcion</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/panel.css">
</head>
<body>
    <div class="contenedor-panel">
        <div class="cabecera">
            <h1>Crear Cita</h1>
            <p id="bienvenida"></p>
            <button onclick="cerrarSesion()">Cerrar sesion</button>
        </div>

        <form id="form-cita">
            <label for="paciente">Paciente</label>
            <select id="paciente" required>
                <option value="">Cargando...</option>
            </select>

            <label for="medico">Medico</label>
            <select id="medico" required>
                <option value="">Cargando...</option>
            </select>

            <label for="fecha_hora">Fecha y hora</label>
            <input type="datetime-local" id="fecha_hora" required>

            <label for="motivo">Motivo</label>
            <input type="text" id="motivo" placeholder="Ej: Consulta general">

            <button type="submit">Crear Cita</button>
        </form>
        <p id="mensaje-resultado"></p>
    </div>

    <script src="js/comun.js"></script>
    <script src="js/recepcion.js"></script>
</body>
</html>
