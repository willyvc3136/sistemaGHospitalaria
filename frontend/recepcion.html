<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Recepción — Vitalis</title>
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/panel-vitalis.css">
</head>
<body>
    <header class="panel-header">
        <div class="panel-marca">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                <circle cx="16" cy="16" r="15" stroke="#0F4C46" stroke-width="2"/>
                <path d="M8 16H12L14 10L18 22L20 16H24" stroke="#F2613F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Vitalis
        </div>
        <div class="panel-usuario">
            <span class="panel-usuario-nombre" id="bienvenida"></span>
            <button class="boton-salir" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </header>

    <main class="panel-cuerpo" style="max-width:1040px;">
        <div class="panel-grid">
            <div class="panel-principal">

                <div class="tarjeta-reserva">
                    <div class="tarjeta-reserva-titulo">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                        <h2>Registrar nueva cita</h2>
                    </div>
                    <form id="form-cita">
                        <label for="paciente">Paciente</label>
                        <select id="paciente" required>
                            <option value="">Cargando...</option>
                        </select>

                        <label for="medico">Médico</label>
                        <select id="medico" required>
                            <option value="">Cargando...</option>
                        </select>

                        <div class="fila-horario">
                            <div>
                                <label for="fecha">Fecha</label>
                                <input type="date" id="fecha" required>
                            </div>
                            <div>
                                <label for="hora">Hora</label>
                                <select id="hora" required>
                                    <option value="">Selecciona</option>
                                </select>
                            </div>
                        </div>

                        <label for="motivo">Motivo</label>
                        <input type="text" id="motivo" placeholder="Ej: Consulta general">

                        <button type="submit" class="boton-primario" style="width:100%; margin-top:18px;">Crear cita</button>
                    </form>
                    <p id="mensaje-resultado"></p>
                </div>

                <div class="seccion-historial-titulo">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/></svg>
                    <h2>Agenda del día</h2>
                </div>

                <div class="filtro-estado">
                    <button class="filtro-boton activo" data-filtro="todas" onclick="filtrarAgenda('todas', this)">Todas</button>
                    <button class="filtro-boton" data-filtro="pendiente" onclick="filtrarAgenda('pendiente', this)">Pendientes</button>
                    <button class="filtro-boton" data-filtro="confirmada" onclick="filtrarAgenda('confirmada', this)">Confirmadas</button>
                </div>

                <div id="lista-agenda">
                    <p>Cargando agenda...</p>
                </div>

            </div>

            <aside>
                <div class="sidebar-campania">
                    <span class="sidebar-campania-badge">Campaña activa</span>
                    <h3>Semana de la salud preventiva</h3>
                    <p>Recuerda ofrecer el chequeo general gratuito a pacientes nuevos.</p>
                </div>
                <div class="sidebar-info">
                    <h4>Recordatorios</h4>
                    <div class="sidebar-info-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                        Confirma citas pendientes antes del mediodía
                    </div>
                    <div class="sidebar-info-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.5 2-3 2-5a5 5 0 0 0-10 0c0 2 .5 3.5 2 5"/><circle cx="12" cy="18" r="4"/></svg>
                        Deriva a especialista si el motivo lo amerita
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="js/comun.js"></script>
    <script src="js/recepcion.js"></script>
</body>
</html>
