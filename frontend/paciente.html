<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Citas — Vitalis</title>
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/panel-vitalis.css">
</head>
<body>
    <header class="panel-header">
        <div class="panel-marca">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                <circle cx="16" cy="16" r="15" stroke="#0F4C46" stroke-width="2"/>
                <path d="M8 16H12L14 10L18 22L20 16H24" stroke="#F2613F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Vitalis
        </div>
        <div class="panel-usuario">
            <span class="panel-usuario-nombre" id="bienvenida"></span>
            <button class="boton-salir" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </header>

    <main class="panel-cuerpo">
        <div class="tarjeta-reserva">
            <div class="tarjeta-reserva-titulo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                <h2>Reservar consulta general</h2>
            </div>
            <form id="form-reservar">
                <label for="fecha_hora">Fecha y hora</label>
                <input type="datetime-local" id="fecha_hora" required>

                <label for="motivo">Motivo</label>
                <input type="text" id="motivo" placeholder="Ej: Dolor de cabeza persistente">

                <button type="submit" class="boton-primario" style="width:100%; margin-top:18px;">Reservar cita</button>
            </form>
            <p id="mensaje-resultado"></p>
        </div>

        <div class="seccion-historial-titulo">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
            <h2>Historial de citas</h2>
        </div>
        <div id="lista-citas">
            <p>Cargando citas...</p>
        </div>
    </main>

    <script src="js/comun.js"></script>
    <script src="js/paciente.js"></script>
</body>
</html>
