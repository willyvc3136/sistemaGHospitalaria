<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Citas</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/panel.css">
</head>
<body>
    <div class="contenedor-panel">
        <div class="cabecera">
            <h1>Mis Citas</h1>
            <p id="bienvenida"></p>
            <button onclick="cerrarSesion()">Cerrar sesion</button>
        </div>

        <h2 style="font-size:16px; margin-bottom:12px;">Reservar consulta general</h2>
        <form id="form-reservar">
            <label for="fecha_hora">Fecha y hora</label>
            <input type="datetime-local" id="fecha_hora" required>

            <label for="motivo">Motivo</label>
            <input type="text" id="motivo" placeholder="Ej: Dolor de cabeza persistente">

            <button type="submit">Reservar cita</button>
        </form>
        <p id="mensaje-resultado"></p>

        <h2 style="font-size:16px; margin:28px 0 12px;">Historial de citas</h2>
        <div id="lista-citas">
            <p>Cargando citas...</p>
        </div>
    </div>

    <script src="js/comun.js"></script>
    <script src="js/paciente.js"></script>
</body>
</html>
